<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Curated Chaos — Fragments of Real People</title>
    <meta name="description" content="Six were witnessed. Fragments of Real People — an interactive intro from Curated Chaos." />

    <link rel="icon" href="/favicon.ico" sizes="any" />
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32.png" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <link rel="manifest" href="/site.webmanifest" />
    <meta name="theme-color" content="#07080c" />
    <meta property="og:type" content="website" />
    <meta property="og:title" content="Curated Chaos — Fragments of Real People" />
    <meta property="og:description" content="Six were witnessed. Create your own fragment." />
    <meta property="og:image" content="https://fantastic-elements.artifactstudio.info/og.png" />
    <meta property="og:url" content="https://fantastic-elements.artifactstudio.info" />
    <meta name="twitter:card" content="summary_large_image" />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Chicle&family=Fraunces:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400&family=Space+Grotesk:wght@300;400;500&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="/src/styles.css" />
  </head>
  <body>
    <!-- STAGE: two scrubbed films sharing one fixed frame. film = phase 1 (C1–C6,
         K1→K2→K12→K3→K11→K13→K14); film2 = phase 2 (C7–C16, the climax + resolution).
         The two share the same seam frame (K14), so the crossfade at the join is invisible.
         The clip morphs ARE the scene changes — no cuts, no wipes needed inside the take. -->
    <div class="stage" aria-hidden="true">
      <video
        class="film"
        id="film"
        muted
        playsinline
        preload="auto"
        poster="/hero-poster.jpg"
      >
        <source src="/hero/phase1-scrub.webm" type="video/webm" />
        <source src="/hero/phase1-scrub.mp4" type="video/mp4" />
      </video>
      <video
        class="film film--2"
        id="film2"
        muted
        playsinline
        preload="auto"
      >
        <source src="/hero/phase2-scrub.webm" type="video/webm" />
        <source src="/hero/phase2-scrub.mp4" type="video/mp4" />
      </video>
    </div>
    <div class="scrim" aria-hidden="true"></div>
    <div class="vignette" aria-hidden="true"></div>
    <div class="grain" aria-hidden="true"></div>

    <aside class="rail" aria-hidden="true">
      <span class="rail__phase">PHASE&nbsp;I</span>
      <span class="rail__tick" id="railTick"></span>
      <span class="rail__label" id="railLabel">00</span>
    </aside>

    <main id="app">
      <section class="hero" id="hero-sec">
        <div class="hero__pin">
          <!-- 01 · Title over the calm hero (K1) -->
          <div class="plate plate--center" data-plate="title">
            <h1 class="display">Curated Chaos</h1>
            <span class="display__sub">Fragments of Real People</span>
          </div>

          <!-- 02 · The shatter lands (K2) -->
          <div class="plate plate--center" data-plate="note">
            <p class="note">Six were witnessed.</p>
          </div>

          <!-- 03 · Fragment I — Agustín (K12) -->
          <div class="plate plate--frag" data-plate="fragA"></div>

          <!-- 04 · Action (K3) -->
          <div class="plate plate--right" data-plate="beatAction">
            <p class="beat__line">He fought to keep them whole.</p>
          </div>

          <!-- 05 · Fragment II — Najoua (K11) -->
          <div class="plate plate--frag" data-plate="fragN"></div>

          <!-- 06 · Twin Spiral charge (K13) -->
          <div class="plate plate--right" data-plate="beatCharge">
            <p class="beat__line">Two discs woke in his hands,</p>
          </div>

          <!-- 07 · Twin Spiral throw (K14) — the seam into phase 2 (the discs he looses
               become C7's streaking, shattering discs) -->
          <div class="plate plate--right" data-plate="beatThrow">
            <p class="beat__line">and he loosed them, spiralling.</p>
          </div>
        </div>
      </section>

      <!-- PHASE II · the climax reel (C7–C16, K14→…→K5). Same continuous scroll-scrub;
           film2 crossfades in at the shared seam frame. Four more fragments reveal at the
           exact moment their motif is on screen (pendant · nazar · data · dipper), and the
           story lands on the calm resolution (K5) under the CTA. -->
      <section class="reel" id="reel-sec">
        <div class="reel__pin">
          <!-- 00 · the bridge line (2 witnessed + 4 = the six) -->
          <div class="plate plate--center" data-plate="reelIntro">
            <p class="note">Four more were witnessed.</p>
          </div>

          <!-- III · Federica — the lapis pendant (K8) -->
          <div class="plate plate--frag" data-plate="fragF"></div>
          <!-- IV · Başak — the evil-eye nazar (K9) -->
          <div class="plate plate--frag" data-plate="fragB"></div>
          <!-- V · Baver — the data in the glass (BAVER) -->
          <div class="plate plate--frag" data-plate="fragV"></div>
          <!-- VI · Yaşar Efe — the constellation (K10) -->
          <div class="plate plate--frag" data-plate="fragY"></div>

          <!-- Finale · CTA over the resolution frame (K5) -->
          <div class="plate plate--center" data-plate="cta">
            <span class="cta__kicker">The story is still shattering.</span>
            <h2 class="cta__title">Dark<br />&amp; fantastical&nbsp;elements.</h2>
            <a class="cta__btn" href="/create">Create your own fragment →</a>
          </div>
        </div>
      </section>
    </main>

    <script type="module" src="/src/hero.js"></script>
  </body>
</html>
