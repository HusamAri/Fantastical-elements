<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Curated Chaos — Fragments of Real People</title>
    <meta name="description" content="Six were witnessed. Fragments of Real People — Curated Chaos." />

    <link rel="icon" href="/favicon.ico" sizes="any" />
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32.png" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <link rel="manifest" href="/site.webmanifest" />
    <meta name="theme-color" content="#0d1119" />
    <meta property="og:type" content="website" />
    <meta property="og:title" content="Curated Chaos — Fragments of Real People" />
    <meta property="og:description" content="Six were witnessed. Create your own fragment." />
    <meta property="og:image" content="https://fantastic-elements.artifactstudio.info/og.png" />
    <meta property="og:url" content="https://fantastic-elements.artifactstudio.info" />
    <meta name="twitter:card" content="summary_large_image" />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,400&family=Montserrat:wght@300;400;500&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="/src/styles.css" />
  </head>
  <body>
    <!-- Cinematic hero video: fixed, scrubbed by scroll -->
    <video id="hero" playsinline muted preload="auto" aria-hidden="true">
      <source src="/hero.mp4" type="video/mp4" />
    </video>
    <div class="scrim" aria-hidden="true"></div>
    <div class="grain" aria-hidden="true"></div>

    <aside class="rail" aria-hidden="true">
      <span class="rail__tick" id="railTick"></span>
      <span class="rail__label" id="railLabel">I — 000%</span>
    </aside>

    <main id="app">
      <section class="hero" id="hero-sec">
        <div class="hero__pin">
          <!-- Title -->
          <div class="plate plate--title" data-plate="title">
            <h1 class="display">Curated&nbsp;Chaos</h1>
            <span class="display__sub">Fragments of Real People</span>
          </div>

          <!-- Fragment plates (populated from JS) -->
          <div class="plate plate--fragment" data-plate="frag"></div>

          <!-- Interstitial -->
          <div class="plate plate--note" data-plate="note">
            <p class="note">Six were witnessed.</p>
          </div>

          <!-- Final CTA -->
          <div class="plate plate--cta" data-plate="cta">
            <h2 class="cta__title">Dark<br />&amp; fantastical elements.</h2>
            <a class="cta__btn" href="/create">Create your own fragment →</a>
          </div>
        </div>
      </section>
    </main>

    <script type="module" src="/src/hero.js"></script>
  </body>
</html>
