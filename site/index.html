<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Curated Chaos — Fragments of Real People</title>
    <meta name="description" content="Six were witnessed. Fragments of Real People — an interactive intro from Curated Chaos." />

    <link rel="icon" href="/favicon.ico" sizes="any" />
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32.png" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <link rel="manifest" href="/site.webmanifest" />
    <meta name="theme-color" content="#07080c" />
    <meta property="og:type" content="website" />
    <meta property="og:title" content="Curated Chaos — Fragments of Real People" />
    <meta property="og:description" content="Six were witnessed. Create your own fragment." />
    <meta property="og:image" content="https://fantastic-elements.artifactstudio.info/og.png" />
    <meta property="og:url" content="https://fantastic-elements.artifactstudio.info" />
    <meta name="twitter:card" content="summary_large_image" />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,400&family=Montserrat:wght@300;400;500&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="/src/styles.css" />
  </head>
  <body>
    <!-- STAGE: the phase-1 film (C1–C6, K1→K2→K12→K3→K11→K13→K14) scrubbed by scroll.
         The clip morphs ARE the scene changes — no cuts, no wipes needed inside the take. -->
    <div class="stage" aria-hidden="true">
      <video
        class="film"
        id="film"
        muted
        playsinline
        preload="auto"
        poster="/hero-poster.jpg"
      >
        <source src="/hero/phase1-scrub.webm" type="video/webm" />
        <source src="/hero/phase1-scrub.mp4" type="video/mp4" />
      </video>
    </div>
    <div class="scrim" aria-hidden="true"></div>
    <div class="vignette" aria-hidden="true"></div>
    <div class="grain" aria-hidden="true"></div>

    <aside class="rail" aria-hidden="true">
      <span class="rail__phase">PHASE&nbsp;I</span>
      <span class="rail__tick" id="railTick"></span>
      <span class="rail__label" id="railLabel">00</span>
    </aside>

    <main id="app">
      <section class="hero" id="hero-sec">
        <div class="hero__pin">
          <!-- 01 · Title over the calm hero (K1) -->
          <div class="plate plate--center" data-plate="title">
            <h1 class="display">Curated&nbsp;Chaos</h1>
            <span class="display__sub">Fragments of Real People</span>
          </div>

          <!-- 02 · The shatter lands (K2) -->
          <div class="plate plate--center" data-plate="note">
            <p class="note">Six were witnessed.</p>
          </div>

          <!-- 03 · Fragment I — Agustín (K12) -->
          <div class="plate plate--frag" data-plate="fragA"></div>

          <!-- 04 · Action (K3) -->
          <div class="plate plate--right" data-plate="beatAction">
            <p class="beat__line">He fought to keep them whole.</p>
          </div>

          <!-- 05 · Fragment II — Najoua (K11) -->
          <div class="plate plate--frag" data-plate="fragN"></div>

          <!-- 06 · Twin Spiral charge (K13) -->
          <div class="plate plate--right" data-plate="beatCharge">
            <p class="beat__line">Two discs woke in his hands,</p>
          </div>

          <!-- 07 · Twin Spiral throw (K14) -->
          <div class="plate plate--right" data-plate="beatThrow">
            <p class="beat__line">and he loosed them, spiralling.</p>
          </div>

          <!-- 08 · CTA over the last frame -->
          <div class="plate plate--center" data-plate="cta">
            <span class="cta__kicker">The story is still shattering.</span>
            <h2 class="cta__title">Dark<br />&amp; fantastical&nbsp;elements.</h2>
            <a class="cta__btn" href="/create">Create your own fragment →</a>
          </div>
        </div>
      </section>
    </main>

    <script type="module" src="/src/hero.js"></script>
  </body>
</html>
